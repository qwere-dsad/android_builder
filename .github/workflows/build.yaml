name: android_build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout builder
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Get project repo
        id: get-project
        run: echo "PROJECT=$(cat project-to-build)" >> $GITHUB_OUTPUT

      - name: Clone TVBox project
        run: git clone --depth=1 ${{ steps.get-project.outputs.PROJECT }} project

      - name: Find Gradle project root
        id: find-root
        working-directory: ./project
        run: |
          # 查找包含 settings.gradle 的目录
          GRADLE_ROOT=$(find . -name "settings.gradle*" -printf "%h\n" | head -1)
          if [ -z "$GRADLE_ROOT" ]; then
            echo "❌ No settings.gradle found in cloned repo"
            echo "Contents of project directory:"
            ls -la
            exit 1
          fi
          echo "✅ Found Gradle root at: $GRADLE_ROOT"
          echo "root=$GRADLE_ROOT" >> $GITHUB_OUTPUT

      - name: Build APK
        working-directory: ./project/${{ steps.find-root.outputs.root }}
        run: |
          # 如果没有 gradlew，则生成
          if [ ! -f "gradlew" ]; then
            gradle wrapper
          fi
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v5
        with:
          name: my-build-apk
          path: ./**/*.apk
